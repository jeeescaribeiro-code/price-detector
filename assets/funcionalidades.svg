<svg width="100%" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Funcionalidades do PriceDetection</title>
<desc>Quatro cards coloridos e animados com as funcionalidades do dashboard</desc>
<defs>
  <style>
    @keyframes popIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes wiggle { 0%,100%{transform:rotate(0)} 30%{transform:rotate(-8deg)} 60%{transform:rotate(8deg)} }
    @keyframes ping { 0%{transform:scale(1);opacity:.8} 100%{transform:scale(1.6);opacity:0} }
    .c1 { animation: popIn .5s ease-out both .1s; }
    .c2 { animation: popIn .5s ease-out both .25s; }
    .c3 { animation: popIn .5s ease-out both .4s; }
    .c4 { animation: popIn .5s ease-out both .55s; }
    .icon1 { animation: bounce 2.5s ease-in-out infinite; transform-origin: 90px 55px; }
    .icon2 { animation: wiggle 3s ease-in-out infinite 1s; transform-origin: 250px 55px; }
    .icon3 { animation: bounce 2.8s ease-in-out infinite .5s; transform-origin: 415px 55px; }
    .icon4 { animation: wiggle 2.5s ease-in-out infinite 1.5s; transform-origin: 582px 55px; }
    .ping { animation: ping 2s ease-out infinite; }
  </style>
</defs>
<!-- Card 1: Buscar Produto -->
<g class="c1">
  <rect x="16" y="10" width="148" height="160" rx="14" fill="#AFA9EC" opacity=".18"/>
  <rect x="16" y="10" width="148" height="160" rx="14" fill="none" stroke="#7F77DD" stroke-width="1.2" opacity=".5"/>
  <g class="icon1">
    <circle cx="84" cy="52" r="16" fill="none" stroke="#7F77DD" stroke-width="2.5"/>
    <line x1="95" y1="64" x2="106" y2="74" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="84" cy="52" r="7" fill="#AFA9EC" opacity=".5"/>
  </g>
  <circle class="ping" cx="106" cy="74" r="5" fill="#7F77DD" opacity=".6"/>
  <text x="90" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#7F77DD">Buscar</text>
  <text x="90" y="116" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#7F77DD">Produto</text>
  <text x="90" y="136" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#AFA9EC">Menor preço</text>
  <text x="90" y="150" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#AFA9EC">do dia</text>
</g>
<!-- Card 2: Histórico -->
<g class="c2">
  <rect x="180" y="10" width="148" height="160" rx="14" fill="#5DCAA5" opacity=".15"/>
  <rect x="180" y="10" width="148" height="160" rx="14" fill="none" stroke="#1D9E75" stroke-width="1.2" opacity=".5"/>
  <g class="icon2">
    <polyline points="218,70 232,54 246,62 260,42 274,50" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="218" cy="70" r="3.5" fill="#1D9E75"/>
    <circle cx="232" cy="54" r="3.5" fill="#1D9E75"/>
    <circle cx="246" cy="62" r="3.5" fill="#1D9E75"/>
    <circle cx="260" cy="42" r="3.5" fill="#FAC775"/>
    <circle cx="274" cy="50" r="3.5" fill="#1D9E75"/>
    <line x1="210" y1="76" x2="282" y2="76" stroke="#1D9E75" stroke-width="1.2" opacity=".5"/>
  </g>
  <text x="254" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#1D9E75">Histórico</text>
  <text x="254" y="116" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#1D9E75">de Preços</text>
  <text x="254" y="136" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5DCAA5">Média móvel</text>
  <text x="254" y="150" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5DCAA5">de 7 dias</text>
</g>
<!-- Card 3: Comparar Lista -->
<g class="c3">
  <rect x="346" y="10" width="148" height="160" rx="14" fill="#F0997B" opacity=".15"/>
  <rect x="346" y="10" width="148" height="160" rx="14" fill="none" stroke="#D85A30" stroke-width="1.2" opacity=".5"/>
  <g class="icon3">
    <rect x="403" y="38" width="40" height="5" rx="2.5" fill="#D85A30"/>
    <rect x="403" y="48" width="30" height="5" rx="2.5" fill="#D85A30" opacity=".7"/>
    <rect x="403" y="58" width="35" height="5" rx="2.5" fill="#D85A30" opacity=".5"/>
    <text x="400" y="59" text-anchor="end" font-family="sans-serif" font-size="14" fill="#D85A30">1.</text>
  </g>
  <text x="420" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#D85A30">Comparar</text>
  <text x="420" y="116" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#D85A30">Lista</text>
  <text x="420" y="136" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#F0997B">Ranking dos</text>
  <text x="420" y="150" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#F0997B">supermercados</text>
</g>
<!-- Card 4: Promoções -->
<g class="c4">
  <rect x="512" y="10" width="152" height="160" rx="14" fill="#FAC775" opacity=".15"/>
  <rect x="512" y="10" width="152" height="160" rx="14" fill="none" stroke="#BA7517" stroke-width="1.2" opacity=".5"/>
  <g class="icon4">
    <path d="M574 38 L600 38 L610 52 L600 66 L574 66 L568 52 Z" fill="none" stroke="#BA7517" stroke-width="2.2" stroke-linejoin="round"/>
    <circle cx="578" cy="52" r="3.5" fill="#BA7517"/>
    <text x="590" y="56" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#BA7517">%</text>
  </g>
  <text x="588" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#BA7517">Promoções</text>
  <text x="588" y="116" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#BA7517">de Hoje</text>
  <text x="588" y="136" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#EF9F27">Queda &gt;5%</text>
  <text x="588" y="150" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#EF9F27">vs. ontem</text>
</g>
</svg>

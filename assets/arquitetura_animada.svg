<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Arquitetura do PriceDetection</title>
<desc>Diagrama animado mostrando o fluxo do coletor.py pelo GitHub Actions até o banco e o dashboard Streamlit</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    @keyframes popIn { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }
    @keyframes dash { to { stroke-dashoffset: -24; } }
    @keyframes glow { 0%,100%{opacity:.5} 50%{opacity:1} }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    .b1 { animation: popIn .4s ease-out both .1s; }
    .b2 { animation: popIn .4s ease-out both .35s; }
    .b3 { animation: popIn .4s ease-out both .6s; }
    .b4 { animation: popIn .4s ease-out both .85s; }
    .flow1 { stroke-dasharray: 8 4; animation: dash 1.2s linear infinite; }
    .flow2 { stroke-dasharray: 8 4; animation: dash 1.2s linear infinite .4s; }
    .flow3 { stroke-dasharray: 8 4; animation: dash 1.2s linear infinite .8s; }
    .cron { animation: glow 2s ease-in-out infinite; }
    .app-bob { animation: bob 3s ease-in-out infinite; transform-origin: 530px 150px; }
  </style>
</defs>
<!-- Bloco 1: coletor.py -->
<g class="b1">
  <rect x="20" y="90" width="130" height="120" rx="14" fill="#AFA9EC" opacity=".22"/>
  <rect x="20" y="90" width="130" height="120" rx="14" fill="none" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="85" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#7F77DD">coletor.py</text>
  <text x="85" y="136" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#AFA9EC">Gera preços</text>
  <text x="85" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#AFA9EC">simulados</text>
  <path d="M62 168 Q85 158 108 168" fill="none" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="108" cy="168" r="4" fill="#7F77DD"/>
  <text x="85" y="196" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7F77DD" opacity=".7">Python 3.11</text>
</g>
<!-- Seta 1 -->
<text x="176" y="142" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7F77DD" opacity=".8">executa</text>
<line class="flow1" x1="152" y1="150" x2="200" y2="150" stroke="#7F77DD" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<!-- Bloco 2: GitHub Actions -->
<g class="b2">
  <rect x="202" y="90" width="136" height="120" rx="14" fill="#FAC775" opacity=".18"/>
  <rect x="202" y="90" width="136" height="120" rx="14" fill="none" stroke="#BA7517" stroke-width="1.5"/>
  <text x="270" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#BA7517">GitHub Actions</text>
  <text x="270" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#EF9F27" class="cron">08h diario</text>
  <circle cx="270" cy="166" r="14" fill="none" stroke="#BA7517" stroke-width="2" opacity=".5"/>
  <circle cx="270" cy="166" r="6" fill="#BA7517" opacity=".6"/>
  <text x="270" y="196" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#BA7517" opacity=".7">workflow_dispatch</text>
</g>
<!-- Seta 2 -->
<text x="364" y="142" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#BA7517" opacity=".8">salva</text>
<line class="flow2" x1="340" y1="150" x2="388" y2="150" stroke="#BA7517" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<!-- Bloco 3: priceradar.db -->
<g class="b3">
  <rect x="390" y="90" width="130" height="120" rx="14" fill="#5DCAA5" opacity=".18"/>
  <rect x="390" y="90" width="130" height="120" rx="14" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="455" y="116" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1D9E75">priceradar.db</text>
  <text x="455" y="131" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5DCAA5">SQLite</text>
  <ellipse cx="455" cy="152" rx="22" ry="8" fill="none" stroke="#1D9E75" stroke-width="1.8"/>
  <line x1="433" y1="152" x2="433" y2="168" stroke="#1D9E75" stroke-width="1.8"/>
  <line x1="477" y1="152" x2="477" y2="168" stroke="#1D9E75" stroke-width="1.8"/>
  <ellipse cx="455" cy="168" rx="22" ry="8" fill="none" stroke="#1D9E75" stroke-width="1.8"/>
  <text x="455" y="196" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1D9E75" opacity=".7">16 produtos · 5 mercados</text>
</g>
<!-- Seta 3 -->
<text x="540" y="142" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#D85A30" opacity=".8">le</text>
<line class="flow3" x1="522" y1="150" x2="558" y2="150" stroke="#D85A30" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
<!-- Bloco 4: app.py -->
<g class="b4 app-bob">
  <rect x="560" y="90" width="104" height="120" rx="14" fill="#F0997B" opacity=".18"/>
  <rect x="560" y="90" width="104" height="120" rx="14" fill="none" stroke="#D85A30" stroke-width="1.5"/>
  <text x="612" y="116" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#D85A30">app.py</text>
  <text x="612" y="131" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#F0997B">Streamlit</text>
  <rect x="592" y="140" width="40" height="26" rx="4" fill="none" stroke="#D85A30" stroke-width="1.5"/>
  <line x1="612" y1="166" x2="612" y2="174" stroke="#D85A30" stroke-width="1.5"/>
  <line x1="604" y1="174" x2="620" y2="174" stroke="#D85A30" stroke-width="1.5"/>
  <text x="612" y="196" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#D85A30" opacity=".7">4 paginas</text>
</g>
<!-- Aviso dados simulados -->
<rect x="160" y="240" width="360" height="30" rx="10" fill="#FAC775" opacity=".13"/>
<rect x="160" y="240" width="360" height="30" rx="10" fill="none" stroke="#BA7517" stroke-width="1" opacity=".4"/>
<text x="340" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#BA7517">Dados 100% simulados - sem coleta real</text>
</svg>

<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Banner PriceDetection</title>
<desc>Banner animado colorido do projeto PriceDetection</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0a0a2e"/>
    <stop offset="40%" stop-color="#3d1278"/>
    <stop offset="100%" stop-color="#7F77DD"/>
  </linearGradient>
  <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#ffffff" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }
    @keyframes drift { 0%{transform:translateX(0) translateY(0)} 100%{transform:translateX(8px) translateY(-12px)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .cart { animation: float 2.8s ease-in-out infinite; transform-origin: 100px 100px; }
    .dot1 { animation: pulse 2s ease-in-out infinite; }
    .dot2 { animation: pulse 2s ease-in-out infinite .5s; }
    .dot3 { animation: pulse 2s ease-in-out infinite 1s; }
    .star1 { animation: drift 4s ease-in-out infinite alternate; }
    .star2 { animation: drift 5s ease-in-out infinite alternate-reverse .5s; }
    .badge { animation: fadeIn .8s ease-out both .3s; }
    .title { animation: fadeIn .8s ease-out both; }
    .sub { animation: fadeIn .8s ease-out both .6s; }
  </style>
</defs>
<rect width="680" height="200" rx="16" fill="url(#bg)"/>
<rect width="680" height="200" rx="16" fill="url(#shine)"/>
<circle cx="620" cy="30" r="60" fill="#7F77DD" opacity=".12"/>
<circle cx="60" cy="170" r="50" fill="#3d1278" opacity=".25"/>
<g class="star1"><circle cx="540" cy="60" r="3" fill="#FAC775" opacity=".7"/></g>
<g class="star2"><circle cx="580" cy="130" r="2" fill="#9FE1CB" opacity=".8"/></g>
<circle cx="500" cy="40" r="1.5" fill="#F4C0D1" opacity=".6" class="dot2"/>
<circle cx="620" cy="90" r="2" fill="#B5D4F4" opacity=".5" class="dot3"/>
<circle cx="460" cy="160" r="2.5" fill="#FAC775" opacity=".6" class="dot1"/>
<g class="cart">
  <rect x="58" y="78" width="80" height="54" rx="10" fill="none" stroke="#FAC775" stroke-width="2.5" opacity=".9"/>
  <path d="M42 78 L58 78" stroke="#FAC775" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="72" cy="146" r="6" fill="#FAC775" opacity=".9"/>
  <circle cx="122" cy="146" r="6" fill="#FAC775" opacity=".9"/>
  <line x1="76" y1="95" x2="76" y2="115" stroke="#FAC775" stroke-width="1.5" opacity=".6"/>
  <line x1="90" y1="92" x2="90" y2="118" stroke="#FAC775" stroke-width="1.5" opacity=".6"/>
  <line x1="104" y1="95" x2="104" y2="115" stroke="#FAC775" stroke-width="1.5" opacity=".6"/>
  <line x1="118" y1="98" x2="118" y2="112" stroke="#FAC775" stroke-width="1.5" opacity=".6"/>
</g>
<g class="title">
  <text x="170" y="88" font-family="sans-serif" font-size="28" font-weight="700" fill="#ffffff">PriceDetection</text>
</g>
<g class="sub">
  <text x="172" y="114" font-family="sans-serif" font-size="13" fill="#c8b8f8" letter-spacing="0.5">um novíssimo Detector de Preços</text>
</g>
<g class="badge">
  <rect x="172" y="130" width="76" height="22" rx="11" fill="#7F77DD" opacity=".35"/>
  <text x="210" y="146" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e0d8ff">Python 3.11</text>
</g>
<g class="badge" style="animation-delay:.5s">
  <rect x="256" y="130" width="74" height="22" rx="11" fill="#1D9E75" opacity=".35"/>
  <text x="293" y="146" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9FE1CB">Streamlit</text>
</g>
<g class="badge" style="animation-delay:.7s">
  <rect x="338" y="130" width="66" height="22" rx="11" fill="#378ADD" opacity=".35"/>
  <text x="371" y="146" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#B5D4F4">SQLite</text>
</g>
<g class="badge" style="animation-delay:.9s">
  <rect x="412" y="130" width="110" height="22" rx="11" fill="#BA7517" opacity=".35"/>
  <text x="467" y="146" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FAC775">GitHub Actions</text>
</g>
<g class="dot1"><circle cx="640" cy="155" r="8" fill="#FAC775" opacity=".15"/></g>
<g class="dot2"><circle cx="640" cy="155" r="4" fill="#FAC775" opacity=".4"/></g>
</svg>
